name: nexus_reconciliation
description: Sistema de Conciliação GETNET + TOTVS para Minusa Tratorpeças
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend & Database
  supabase_flutter: ^2.0.0

  # Routing
  go_router: ^13.0.0

  # State Management
  provider: ^6.1.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  dotenv: ^4.1.0
  http: ^1.1.0

  # UI
  cupertino_icons: ^1.0.2
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

  # Assets
  assets:
    - assets/images/
    - .env.example

# Build for web
web:
  renderer: canvaskit
